kind = "web"
previewPath = "/"
title = "رينو بارتس - قطع غيار الإسكندرية"
version = "1.0.0"
id = "artifacts/renault-parts"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21793
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/renault-parts run dev"

[services.env]
PORT = "21793"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/renault-parts", "run", "build"]
publicDir = "artifacts/renault-parts/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
